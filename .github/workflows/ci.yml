name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Create virtualenv and install package (core + dev)
        run: |
          uv venv --python 3.11
          uv pip install -e ".[dev]"

      - name: Lint (ruff)
        run: .venv/bin/ruff check grapevine tests experiments

      - name: Type check (mypy)
        run: .venv/bin/mypy

      - name: Install training extra (CPU-only torch)
        run: |
          uv pip install torch --index-url https://download.pytorch.org/whl/cpu
          uv pip install "trl>=0.11" "transformers>=4.44" "datasets>=2.20" "accelerate>=0.33"

      - name: Tests (includes the 2-step CPU GRPO smoke test)
        env:
          HF_HUB_DOWNLOAD_TIMEOUT: "60"
        run: .venv/bin/pytest -q
